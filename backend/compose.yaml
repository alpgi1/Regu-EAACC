services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: regu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: regu_db
      POSTGRES_USER: ${DB_USERNAME:-regu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-regu_dev_password}
    volumes:
      - regu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regu_user -d regu_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  regu_postgres_data:
