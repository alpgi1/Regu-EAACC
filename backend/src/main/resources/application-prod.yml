# REGU backend — production profile
# Optimized for production: minimal logging, no SQL output, environment-driven config.
# This profile assumes all sensitive values come from environment variables.

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.regu: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
