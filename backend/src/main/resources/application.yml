# REGU backend — common configuration (applies to all profiles)
# Profile-specific overrides live in application-dev.yml and application-prod.yml

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/regu_db}
    username: ${DB_USERNAME:regu_user}
    password: ${DB_PASSWORD:regu_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: ReguHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  web:
    resources:
      add-mappings: false
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

regu:
  service:
    name: regu-backend
    version: 0.1.0
  ingestion:
    # Path to the corpus/ directory relative to the working directory (backend/).
    # Override with REGU_CORPUS_ROOT env var when running from a different location.
    corpus-root: ${REGU_CORPUS_ROOT:../corpus}
    # Voyage AI API key — required when running with the 'ingest' profile.
    voyage-api-key: ${VOYAGE_API_KEY:}
  llm:
    # Anthropic API key — required for LLM calls; app starts safely without it.
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    temperature: 0.1
    max-retries: 2
    classification-max-tokens: 2048
    report-max-tokens: 8192
